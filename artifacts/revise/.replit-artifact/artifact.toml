kind = "web"
previewPath = "/"
title = "Revise"
version = "1.0.0"
id = "artifacts/revise"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26016

[services.development]
run = "pnpm --filter @workspace/revise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/revise", "run", "build" ]
publicDir = "artifacts/revise/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26016"
BASE_PATH = "/"
